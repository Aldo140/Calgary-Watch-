<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!--
      Security Headers are enforced via HTTP response headers on the server
      (see firebase.json headers config). Meta tag equivalents don't work for
      all headers, particularly X-Frame-Options.

      NOTE: Content-Security-Policy is intentionally not in meta tags
      because it cannot block inline event handlers or third-party Leaflet
      tile CDNs without breaking the map. Enforce CSP via server headers
      instead (see firebase.json headers config).
    -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>Calgary Watch | Real-Time Community Safety Map</title>
    
    <!-- Icons — relative paths work with Vite `base` (e.g. GitHub project Pages /RepoName/) -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- PWA & Mobile Optimization -->
    <meta name="application-name" content="Calgary Watch" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Calgary Watch" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta property="og:image" content="https://calgarywatch.ca/images/hero-wide.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:image" content="https://calgarywatch.ca/images/hero-wide.webp" />
    
    <meta
      name="description"
      content="Calgary Watch is a real-time community safety platform for Calgary. Explore live incident reports, map intelligence, and neighborhood context in one place."
    />
    <meta
      name="keywords"
      content="Calgary safety map, Calgary incidents, community reports, neighborhood safety, live alerts, Calgary Watch"
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#020617" />
    <link rel="canonical" href="https://aldo140.github.io/Calgary-Watch-/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Calgary Watch" />
    <meta property="og:title" content="Calgary Watch | Real-Time Community Safety Map" />
    <meta
      property="og:description"
      content="Explore Calgary incident updates in real time with community-sourced reports and neighborhood safety context."
    />
    <meta property="og:url" content="https://aldo140.github.io/Calgary-Watch-/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Calgary Watch | Real-Time Community Safety Map" />
    <meta
      name="twitter:description"
      content="Real-time Calgary community safety map with live reports and neighborhood intelligence."
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Calgary Watch",
        "url": "https://aldo140.github.io/Calgary-Watch-/",
        "description": "Real-time community safety platform for Calgary with live incident mapping and neighborhood awareness.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "CAD"
        }
      }
    </script>

    <script type="text/javascript">
  // Decode the path redirect produced by 404.html before React Router initialises.
  // 404.html encodes forward-slashes as '~and~', e.g. /map → /?p=~and~map
  (function(l) {
    if (l.search[1] === 'p') {
      var rawPath = l.search.slice(3).split('&')[0]; // drop any &q=... query part
      var decoded = rawPath.replace(/~and~/g, '/');
      if (decoded.charAt(0) !== '/') decoded = '/' + decoded;
      window.history.replaceState(null, null, decoded + l.hash);
    }
  }(window.location));
</script>

    <!--
      Preconnect to tile servers, image CDNs, and font providers.
      Using crossorigin on CORS-capable origins to allow credential-free
      connection reuse and reduce first-byte latency.
    -->
    <!-- Leaflet tile CDN -->
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Image CDNs (Pexels hero/card images, Unsplash panel image) -->
    <link rel="preconnect" href="https://images.pexels.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <!-- Firebase Auth / Firestore -->
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
