<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Calgary Watch</title>
    <script type="text/javascript">
      // This script takes the current URL path and converts it into a query string
      // so that the main index.html can read it and redirect correctly.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + l.pathname.replace(/^\/(.*)\/$/, '$1').replace(/\//g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
